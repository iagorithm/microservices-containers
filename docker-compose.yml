services:
  java-api:
    build:
      context: .
      dockerfile: java-api/Dockerfile
    ports:
      - "${JAVA_API_PORT:-8081}:8080"

  python-api:
    build: ./python-api
    ports:
      - "${PYTHON_API_PORT:-8000}:8000"

  go-api:
    build: ./go-api
    ports:
      - "${GO_API_PORT:-8082}:8080"

  nextjs-api:
    build: ./nextjs-api
    ports:
      - "${NEXTJS_PORT:-3004}:3000"

  cpp-hello:
    build: ./cpp-hello

  rust-hello:
    build: ./rust-hello
