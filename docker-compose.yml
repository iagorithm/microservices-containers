services:
  java-api:
    build: ./java-api
    ports:
      - "8081:8080"

  python-api:
    build: ./python-api
    ports:
      - "8000:8000"

  go-api:
    build: ./go-api
    ports:
      - "8082:8080"

  nextjs-api:
    build: ./nextjs-api
    ports:
      - "3000:3000"

  cpp-hello:
    build: ./cpp-hello

  rust-hello:
    build: ./rust-hello
